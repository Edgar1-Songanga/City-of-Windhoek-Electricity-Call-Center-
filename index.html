<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Digital Operations Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* ================= MODERN SAAS RESKIN ================= */

:root{
--bg:#09090b;
--card:rgba(255,255,255,0.04);
--text:#fafafa;
--muted:rgba(255,255,255,0.6);
--border:rgba(255,255,255,0.1);
--primary:#8b5cf6;
--primary-glow:rgba(139,92,246,0.4);
}

body.dark{
--bg:#09090b;
--card:rgba(255,255,255,0.04);
--text:#fafafa;
}

body{
margin:0;
font-family:system-ui,-apple-system,Inter,sans-serif;
background:radial-gradient(circle at 20% 0%, #111113 0%, #09090b 60%);
color:var(--text);
line-height:1.6;
letter-spacing:-0.02em;
transition:all 0.2s ease;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(9,9,11,0.7);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
padding:20px 28px;
color:white;
}

/* CONTROLS */
.controls button{
background:rgba(255,255,255,0.05);
color:#fafafa;
border:1px solid var(--border);
border-radius:12px;
padding:8px 14px;
cursor:pointer;
transition:all 0.2s ease;
}

.controls button:hover{
background:rgba(139,92,246,0.2);
border-color:var(--primary);
}

/* CONTAINER */
.container{
padding:28px;
max-width:1200px;
margin:auto;
}

/* CARD */
.card{
background:var(--card);
backdrop-filter:blur(20px);
border-radius:16px;
padding:24px;
border:1px solid var(--border);
box-shadow:0 8px 30px rgba(0,0,0,0.25);
transition:all 0.2s ease;
margin-bottom:18px;
}

.card:hover{
transform:translateY(-4px);
border-color:var(--primary);
box-shadow:0 12px 40px rgba(0,0,0,0.35);
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,0.02);
color:var(--text);
transition:all 0.2s ease;
}

input:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 2px var(--primary-glow);
}

/* BUTTONS */
button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:none;
font-weight:600;
background:linear-gradient(135deg,#8b5cf6,#6d28d9);
color:white;
cursor:pointer;
transition:all 0.2s ease;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px var(--primary-glow);
}

button:active{
transform:scale(0.98);
}

/* CHAT */
#chatBox{
height:260px;
overflow:auto;
border-radius:16px;
border:1px solid var(--border);
padding:12px;
background:rgba(255,255,255,0.02);
backdrop-filter:blur(20px);
}

/* SCROLL */
#chatBox::-webkit-scrollbar{
width:6px;
}

#chatBox::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.2);
border-radius:10px;
}

/* MAP */
#map{
height:280px;
border-radius:16px;
border:1px solid var(--border);
overflow:hidden;
}

/* TYPOGRAPHY */
h1,h2,h3{
font-weight:600;
letter-spacing:-0.03em;
margin-bottom:10px;
}

p{
color:var(--muted);
}

/* PERFORMANCE */
.card, button, input{
will-change:transform;
}

</style>
</head>

<body>

<header>
<div><b>National Operations Platform</b></div>
<div class="controls">
<button onclick="toggleTheme()">🌙</button>
<button onclick="switchLang()">🌍</button>
</div>
</header>

<div id="app" class="container"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ======= ORIGINAL JS (UNCHANGED) ======= */

let state = {
lang: localStorage.getItem("lang") || "en",
theme: localStorage.getItem("theme") || "light",
sessionId: localStorage.getItem("sessionId") || null,
db: JSON.parse(localStorage.getItem("db") || JSON.stringify({
citizens:[],
logs:[],
events:[]
}))
};

function save(){
localStorage.setItem("db",JSON.stringify(state.db));
localStorage.setItem("sessionId",state.sessionId);
localStorage.setItem("lang",state.lang);
localStorage.setItem("theme",state.theme);
}

const L={
en:{login:"Login",signup:"Sign Up",welcome:"Welcome",chat:"Chat",back:"Back"},
af:{login:"Aanmeld",signup:"Registreer",welcome:"Welkom",chat:"Gesels",back:"Terug"},
osh:{login:"Log in",signup:"Sign up",welcome:"Wa uhala po",chat:"Ombi",back:"Shuna"}
};

function user(){
return state.db.citizens.find(u=>u.email===state.sessionId);
}

function init(){
document.body.className = state.theme==="dark"?"dark":"";
if(state.sessionId) home();
else login();
}
init();

function login(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].login}</h3>
<input id="email">
<input id="pass" type="password">
<button onclick="doLogin()">Login</button>
<button onclick="signup()">Sign Up</button>
</div>`;
}

function doLogin(){
let u = state.db.citizens.find(x=>x.email===email.value && x.pass===pass.value);
if(!u)return alert("Invalid");

state.sessionId = u.email;
state.db.logs.push("LOGIN: "+u.email);
save();
home();
}

function signup(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].signup}</h3>

<input id="fn">
<input id="ln">
<input id="phone">
<input id="email">
<input id="addr">
<input id="meter">
<input id="pass" type="password">
<input id="cpass" type="password">

<button onclick="create()">Create</button>
</div>`;
}

function create(){
if(pass.value!==cpass.value)return alert("Mismatch");

state.db.citizens.push({
firstName:fn.value,
lastName:ln.value,
name:fn.value+" "+ln.value,
phone:phone.value,
email:email.value,
address:addr.value,
meter:meter.value,
pass:pass.value
});

save();
login();
}

function home(){
let u = user();

app.innerHTML=`
<div class="card">
<h3>${L[state.lang].welcome} ${u.name}</h3>

<button onclick="chat()">Chat</button>
<button onclick="outage()">Report Outage</button>
<button onclick="profile()">Profile</button>
</div>

<div class="card">
<h3>Operations - Windhoek</h3>
<div id="map"></div>
</div>
`;

map();
}

function map(){
setTimeout(()=>{
let m=L.map('map').setView([-22.56,17.08],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(m);

L.marker([-22.56,17.08])
.addTo(m)
.bindPopup("National Center - Windhoek");
},200);
}

function chat(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].chat}</h3>
<div id="chatBox"></div>
<input id="msg">
<button onclick="send()">Send</button>
<button onclick="home()">${L[state.lang].back}</button>
</div>`;
}

function send(){
let u=user();
chatBox.innerHTML+=`<div><b>${u.name}:</b> ${msg.value}</div>`;

let r="Request received.";
if(msg.value.toLowerCase().includes("power")) r="Energy issue logged.";
if(msg.value.toLowerCase().includes("bill")) r="Billing checked.";

setTimeout(()=>{
chatBox.innerHTML+=`<div><b>System:</b> ${r}</div>`;
},600);

state.db.logs.push(u.email+": "+msg.value);
save();
}

function profile(){
let u=user();

app.innerHTML=`
<div class="card">
<h3>Profile</h3>

<p>Name: ${u.name}</p>
<p>Email: ${u.email}</p>
<p>Phone: ${u.phone}</p>
<p>Address: ${u.address}</p>
<p>Meter: ${u.meter}</p>

<button onclick="home()">Back</button>
</div>`;
}

function outage(){
state.db.events.push("OUTAGE");
state.db.logs.push("OUTAGE REPORTED");
save();
alert("Reported");
}

function toggleTheme(){
state.theme=state.theme==="dark"?"light":"dark";
document.body.className=state.theme==="dark"?"dark":"";
save();
}

function switchLang(){
let arr=["en","af","osh"];
let i=arr.indexOf(state.lang);
state.lang=arr[(i+1)%3];
save();
home();
}

</script>

</body>
</html>
