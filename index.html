<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Operations Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* ===== PREMIUM EXTREME SYSTEM ===== */

:root{
--bg:#09090b;
--text:#fafafa;
--muted:rgba(255,255,255,0.6);
--border:rgba(255,255,255,0.08);
--primary:#8b5cf6;
--gradient:linear-gradient(135deg,#8b5cf6,#6366f1,#22d3ee);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,Inter,sans-serif;
background:
radial-gradient(circle at 20% 0%, rgba(139,92,246,0.15), transparent 40%),
radial-gradient(circle at 80% 100%, rgba(34,211,238,0.1), transparent 40%),
var(--bg);
color:var(--text);
line-height:1.6;
letter-spacing:-0.02em;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 28px;
background:rgba(9,9,11,0.65);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:10;
}

/* BUTTONS */
.controls button{
background:rgba(255,255,255,0.05);
border:1px solid var(--border);
border-radius:12px;
padding:8px 12px;
color:#fff;
cursor:pointer;
transition:.2s;
}

.controls button:hover{
background:rgba(139,92,246,0.2);
}

/* LAYOUT */
.container{
padding:30px;
max-width:1100px;
margin:auto;
}

/* CARD */
.card{
background:linear-gradient(145deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
border:1px solid var(--border);
border-radius:18px;
padding:26px;
margin-bottom:20px;
backdrop-filter:blur(18px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
border-color:rgba(139,92,246,0.5);
}

/* INPUT */
input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,0.03);
color:#fff;
}

input:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 2px rgba(139,92,246,0.3);
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-weight:600;
background:var(--gradient);
color:#fff;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 30px rgba(139,92,246,0.4);
}

/* CHAT */
#chatBox{
height:260px;
overflow:auto;
padding:12px;
border-radius:14px;
border:1px solid var(--border);
background:rgba(255,255,255,0.02);
}

/* MAP */
#map{
height:300px;
border-radius:18px;
border:1px solid var(--border);
}

/* TEXT */
h3{
margin-bottom:10px;
background:linear-gradient(90deg,#fff,#c7d2fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{color:var(--muted);}

</style>
</head>

<body>

<header>
<div><b>National Operations Platform</b></div>
<div class="controls">
<button onclick="toggleTheme()">🌙</button>
<button onclick="switchLang()">🌍</button>
</div>
</header>

<div id="app" class="container"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ===== GLOBAL STATE ===== */

let state = {
lang: localStorage.getItem("lang") || "en",
theme: localStorage.getItem("theme") || "dark",
sessionId: localStorage.getItem("sessionId") || null,
db: JSON.parse(localStorage.getItem("db") || JSON.stringify({
citizens:[],
tickets:[],
logs:[],
notifications:[]
}))
};

function save(){
localStorage.setItem("db",JSON.stringify(state.db));
localStorage.setItem("sessionId",state.sessionId);
localStorage.setItem("lang",state.lang);
localStorage.setItem("theme",state.theme);
}

/* ===== LANG ===== */

const L={
en:{login:"Login",signup:"Sign Up",welcome:"Welcome",chat:"Chat",back:"Back"},
af:{login:"Aanmeld",signup:"Registreer",welcome:"Welkom",chat:"Gesels",back:"Terug"},
osh:{login:"Log in",signup:"Sign up",welcome:"Wa uhala po",chat:"Ombi",back:"Shuna"}
};

function t(key){
return L[state.lang][key] || key;
}

/* ===== USER ===== */

function user(){
return state.db.citizens.find(u=>u.email===state.sessionId);
}

/* ===== INIT ===== */

function init(){
document.body.className = state.theme==="dark"?"dark":"";
state.db.notifications.push("System active");
if(state.sessionId) home();
else login();
}
init();

/* ===== LOGIN ===== */

function login(){
app.innerHTML=`
<div class="card">
<h3>${t("login")}</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="doLogin()">Login</button>
<button onclick="signup()">Sign Up</button>
</div>`;
}

function doLogin(){
let u = state.db.citizens.find(x=>x.email===email.value && x.pass===pass.value);
if(!u)return alert("Invalid credentials");

state.sessionId = u.email;
state.db.logs.push("LOGIN "+u.email);
save();
home();
}

/* ===== SIGNUP ===== */

function signup(){
app.innerHTML=`
<div class="card">
<h3>${t("signup")}</h3>

<input id="fn" placeholder="First Name">
<input id="ln" placeholder="Last Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="addr" placeholder="Address">
<input id="meter" placeholder="Meter Number">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="create()">Create Account</button>
</div>`;
}

function create(){
if(pass.value!==cpass.value)return alert("Passwords mismatch");

state.db.citizens.push({
name:fn.value+" "+ln.value,
phone:phone.value,
email:email.value,
address:addr.value,
meter:meter.value,
pass:pass.value,
created:new Date().toISOString()
});

state.db.logs.push("REGISTER "+email.value);
save();
login();
}

/* ===== HOME ===== */

function home(){
let u=user();

app.innerHTML=`
<div class="card">
<h3>${t("welcome")} ${u.name}</h3>
<button onclick="chat()">Chat Support</button>
<button onclick="createTicket()">Report Issue</button>
<button onclick="profile()">My Profile</button>
<button onclick="notifications()">Notifications</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Operations - Windhoek</h3>
<div id="map"></div>
</div>
`;

map();
}

/* ===== MAP ===== */

function map(){
setTimeout(()=>{
let m=L.map('map').setView([-22.56,17.08],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
L.marker([-22.56,17.08]).addTo(m).bindPopup("Control Center");
},200);
}

/* ===== CHAT ===== */

function chat(){
app.innerHTML=`
<div class="card">
<h3>${t("chat")}</h3>
<div id="chatBox"></div>
<input id="msg">
<button onclick="send()">Send</button>
<button onclick="home()">${t("back")}</button>
</div>`;
}

function send(){
let u=user();
let text = msg.value;

chatBox.innerHTML+=`<div><b>${u.name}:</b> ${text}</div>`;

let response="Request logged.";
if(text.toLowerCase().includes("power")) response="Power issue registered.";
if(text.toLowerCase().includes("bill")) response="Billing review started.";

setTimeout(()=>{
chatBox.innerHTML+=`<div><b>System:</b> ${response}</div>`;
},600);

state.db.logs.push("CHAT "+u.email+" "+text);
save();
}

/* ===== TICKETS ===== */

function createTicket(){
let u=user();
state.db.tickets.push({
id:Date.now(),
user:u.email,
status:"open",
date:new Date().toISOString()
});

state.db.notifications.push("Ticket created");
save();
alert("Ticket submitted");
}

/* ===== PROFILE ===== */

function profile(){
let u=user();

app.innerHTML=`
<div class="card">
<h3>Profile</h3>
<p>${u.name}</p>
<p>${u.email}</p>
<p>${u.phone}</p>
<p>${u.address}</p>
<p>${u.meter}</p>
<button onclick="home()">Back</button>
</div>`;
}

/* ===== NOTIFICATIONS ===== */

function notifications(){
let list = state.db.notifications.map(n=>`<p>${n}</p>`).join("");

app.innerHTML=`
<div class="card">
<h3>Notifications</h3>
${list}
<button onclick="home()">Back</button>
</div>`;
}

/* ===== SYSTEM ===== */

function logout(){
state.sessionId=null;
save();
login();
}

function toggleTheme(){
state.theme=state.theme==="dark"?"light":"dark";
document.body.className=state.theme==="dark"?"dark":"";
save();
}

function switchLang(){
let arr=["en","af","osh"];
let i=arr.indexOf(state.lang);
state.lang=arr[(i+1)%3];
save();
home();
}

</script>

</body>
  </html>
