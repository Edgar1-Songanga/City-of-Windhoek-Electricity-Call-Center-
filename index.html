<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Digital Operations Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* ===== PREMIUM EXTREME UI ===== */

:root{
--bg:#09090b;
--text:#fafafa;
--muted:rgba(255,255,255,0.55);
--border:rgba(255,255,255,0.08);

--primary:#8b5cf6;
--gradient:linear-gradient(135deg,#8b5cf6,#6366f1,#22d3ee);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:system-ui,-apple-system,Inter,sans-serif;
background:
radial-gradient(circle at 20% 0%, rgba(139,92,246,0.15), transparent 40%),
radial-gradient(circle at 80% 100%, rgba(34,211,238,0.1), transparent 40%),
var(--bg);
color:var(--text);
line-height:1.6;
letter-spacing:-0.02em;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
background:rgba(9,9,11,0.65);
backdrop-filter:blur(24px);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
}

/* BUTTONS TOP */
.controls button{
background:rgba(255,255,255,0.04);
border:1px solid var(--border);
border-radius:12px;
padding:8px 12px;
color:white;
cursor:pointer;
transition:.2s;
}

.controls button:hover{
background:rgba(139,92,246,0.2);
}

/* LAYOUT */
.container{
padding:30px;
max-width:1200px;
margin:auto;
}

/* CARD */
.card{
background:linear-gradient(145deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
border:1px solid var(--border);
border-radius:18px;
padding:26px;
margin-bottom:20px;
backdrop-filter:blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
transition:.25s;
}

.card:hover{
transform:translateY(-6px);
border-color:rgba(139,92,246,0.5);
}

/* INPUT */
input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,0.03);
color:white;
}

input:focus{
outline:none;
border-color:#8b5cf6;
box-shadow:0 0 0 2px rgba(139,92,246,0.3);
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:12px;
font-weight:600;
background:var(--gradient);
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 30px rgba(139,92,246,0.4);
}

/* CHAT */
#chatBox{
height:260px;
overflow:auto;
padding:12px;
border-radius:14px;
border:1px solid var(--border);
background:rgba(255,255,255,0.02);
}

/* MAP */
#map{
height:300px;
border-radius:18px;
border:1px solid var(--border);
}

/* TEXT */
h3{
margin-bottom:10px;
background:linear-gradient(90deg,#fff,#c7d2fe);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{color:var(--muted);}

</style>
</head>

<body>

<header>
<div><b>National Operations Platform</b></div>
<div class="controls">
<button onclick="toggleTheme()">🌙</button>
<button onclick="switchLang()">🌍</button>
</div>
</header>

<div id="app" class="container"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ===== CORE SYSTEM ===== */

let state = {
lang: localStorage.getItem("lang") || "en",
theme: localStorage.getItem("theme") || "dark",
sessionId: localStorage.getItem("sessionId") || null,
db: JSON.parse(localStorage.getItem("db") || JSON.stringify({
citizens:[],
logs:[],
events:[]
}))
};

function save(){
localStorage.setItem("db",JSON.stringify(state.db));
localStorage.setItem("sessionId",state.sessionId);
localStorage.setItem("lang",state.lang);
localStorage.setItem("theme",state.theme);
}

/* LANG */
const L={
en:{login:"Login",signup:"Sign Up",welcome:"Welcome",chat:"Chat",back:"Back"},
af:{login:"Aanmeld",signup:"Registreer",welcome:"Welkom",chat:"Gesels",back:"Terug"},
osh:{login:"Log in",signup:"Sign up",welcome:"Wa uhala po",chat:"Ombi",back:"Shuna"}
};

function user(){
return state.db.citizens.find(u=>u.email===state.sessionId);
}

function init(){
document.body.className = state.theme==="dark"?"dark":"";
if(state.sessionId) home();
else login();
}
init();

/* LOGIN */
function login(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].login}</h3>
<input id="email">
<input id="pass" type="password">
<button onclick="doLogin()">Login</button>
<button onclick="signup()">Sign Up</button>
</div>`;
}

function doLogin(){
let u = state.db.citizens.find(x=>x.email===email.value && x.pass===pass.value);
if(!u)return alert("Invalid");

state.sessionId = u.email;
save();
home();
}

/* SIGNUP */
function signup(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].signup}</h3>

<input id="fn">
<input id="ln">
<input id="phone">
<input id="email">
<input id="addr">
<input id="meter">
<input id="pass" type="password">
<input id="cpass" type="password">

<button onclick="create()">Create</button>
</div>`;
}

function create(){
if(pass.value!==cpass.value)return alert("Mismatch");

state.db.citizens.push({
name:fn.value+" "+ln.value,
phone:phone.value,
email:email.value,
address:addr.value,
meter:meter.value,
pass:pass.value
});

save();
login();
}

/* HOME */
function home(){
let u=user();

app.innerHTML=`
<div class="card">
<h3>${L[state.lang].welcome} ${u.name}</h3>
<button onclick="chat()">Chat</button>
<button onclick="outage()">Report Outage</button>
<button onclick="profile()">Profile</button>
</div>

<div class="card">
<h3>Operations - Windhoek</h3>
<div id="map"></div>
</div>
`;

map();
}

/* MAP */
function map(){
setTimeout(()=>{
let m=L.map('map').setView([-22.56,17.08],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(m);

L.marker([-22.56,17.08]).addTo(m);
},200);
}

/* CHAT */
function chat(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].chat}</h3>
<div id="chatBox"></div>
<input id="msg">
<button onclick="send()">Send</button>
<button onclick="home()">${L[state.lang].back}</button>
</div>`;
}

function send(){
let u=user();
chatBox.innerHTML+=`<div><b>${u.name}:</b> ${msg.value}</div>`;

let r="Request received.";
if(msg.value.includes("power")) r="Power issue logged.";
if(msg.value.includes("bill")) r="Billing checked.";

setTimeout(()=>{
chatBox.innerHTML+=`<div><b>System:</b> ${r}</div>`;
},500);

save();
}

/* PROFILE */
function profile(){
let u=user();

app.innerHTML=`
<div class="card">
<h3>Profile</h3>
<p>${u.name}</p>
<p>${u.email}</p>
<p>${u.phone}</p>
<p>${u.address}</p>
<p>${u.meter}</p>
<button onclick="home()">Back</button>
</div>`;
}

/* OUTAGE */
function outage(){
alert("Outage reported");
}

/* UI */
function toggleTheme(){
state.theme=state.theme==="dark"?"light":"dark";
document.body.className=state.theme==="dark"?"dark":"";
save();
}

function switchLang(){
let arr=["en","af","osh"];
let i=arr.indexOf(state.lang);
state.lang=arr[(i+1)%3];
save();
home();
}

</script>

</body>
</html>
