<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Windhoek National Customer Operations Center</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
transition:.3s;
background-size:cover;
background-position:center;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(0,0,0,.7);
color:#fff;
}

.controls button{
margin-left:10px;
padding:5px 10px;
cursor:pointer;
}

.container{padding:20px;}

.card{
background:rgba(255,255,255,.9);
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.dark{background:#0f172a;color:#fff;}
.dark .card{background:rgba(30,41,59,.95);}

input,button{
margin:5px 0;
padding:8px;
width:100%;
}

#chatBox{
height:200px;
overflow:auto;
border:1px solid #ccc;
margin-bottom:10px;
padding:10px;
}

.profile{
border-bottom:1px solid #ccc;
padding:10px 0;
}

#map{height:250px;border-radius:10px;}
</style>
</head>

<body>

<header>
<div><b>Windhoek National Customer Operations Center</b></div>
<div class="controls">
<button onclick="toggleTheme()">🌙</button>
<button onclick="changeLang()">🌐</button>
</div>
</header>

<div id="app" class="container"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= STATE ================= */
let state={
lang:localStorage.getItem("lang")||"en",
theme:localStorage.getItem("theme")||"light",
users:JSON.parse(localStorage.getItem("users")||"[]"),
tickets:JSON.parse(localStorage.getItem("tickets")||"[]"),
notifications:[]
};

/* ================= SPLASH ================= */
function splash(){
let s=document.createElement("div");
s.style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;z-index:9999;";
s.innerText="Windhoek Operations";
document.body.appendChild(s);
setTimeout(()=>{s.remove();loginScreen();},2500);
}

/* ================= LANG ================= */
const i18n={
en:{welcome:"Welcome"},
af:{welcome:"Welkom"},
osh:{welcome:"Wa uhala po"}
};

function changeLang(){
let langs=["en","af","osh"];
let i=langs.indexOf(state.lang);
state.lang=langs[(i+1)%3];
localStorage.setItem("lang",state.lang);
}

/* ================= THEME ================= */
function toggleTheme(){
document.body.classList.toggle("dark");
}

/* ================= LOGIN ================= */
function loginScreen(){
app.innerHTML=`
<div class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signupScreen()">Sign Up</button>
</div>`;
}

/* ================= SIGNUP ================= */
function signupScreen(){
app.innerHTML=`
<div class="card">
<h3>Sign Up</h3>

<input id="fn" placeholder="First Name">
<input id="ln" placeholder="Last Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="addr" placeholder="Address">
<input id="meter" placeholder="Meter Number">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="signup()">Register</button>
</div>`;
}

function signup(){
if(pass.value!==cpass.value)return alert("Password mismatch");

state.users.push({
email:email.value,
pass:pass.value,
name:fn.value+" "+ln.value
});

localStorage.setItem("users",JSON.stringify(state.users));
alert("Account created");
loginScreen();
}

/* ================= LOGIN ================= */
function login(){
let u=state.users.find(x=>x.email===email.value && x.pass===pass.value);
if(!u)return alert("Invalid login");

state.user=u;
home();
}

/* ================= HOME ================= */
function home(){
app.innerHTML=`
<h2>${i18n[state.lang].welcome} ${state.user.name}</h2>

<div class="card">
<button onclick="outage()">Report Power Outage</button>
<button onclick="support()">Technical Support</button>
<button onclick="chat()">Speak to Representative</button>
<button onclick="notifications()">Notifications</button>
<button onclick="account()">My Account</button>
<button onclick="agent()">Agent Panel</button>
<button onclick="admin()">Admin Panel</button>
</div>

<div class="card">
<h3>Live Map - Windhoek</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>Support Team</h3>
<div id="profiles"></div>
</div>
`;

initMap();
profiles();
}

/* ================= MAP ================= */
function initMap(){
let map=L.map('map').setView([-22.56,17.08],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.marker([-22.56,17.08]).addTo(map).bindPopup("Operations Center").openPopup();
}

/* ================= PROFILES ================= */
function profiles(){
let data=[
{name:"Maria K.",role:"Support Lead"},
{name:"David N.",role:"Technical Specialist"}
];
let div=document.getElementById("profiles");
data.forEach(p=>{
div.innerHTML+=`<div class="profile"><b>${p.name}</b><br>${p.role}</div>`;
});
}

/* ================= CHAT ================= */
function chat(){
app.innerHTML=`
<div class="card">
<h3>Chat</h3>
<div id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
<button onclick="home()">Back</button>
</div>`;
}

function sendMsg(){
chatBox.innerHTML+=`<div><b>You:</b> ${msg.value}</div>`;
setTimeout(()=>{
chatBox.innerHTML+=`<div><b>Agent:</b> Issue received and being processed.</div>`;
},800);
}

/* ================= OUTAGE ================= */
function outage(){
alert("Outage reported");
}

/* ================= SUPPORT ================= */
function support(){
app.innerHTML=`<div class="card">
<h3>Technical Support</h3>
<ul>
<li>FAQs</li>
<li>Safety Tips</li>
<li>Voltage Info</li>
</ul>
<button onclick="home()">Back</button>
</div>`;
}

/* ================= NOTIFICATIONS ================= */
function notifications(){
app.innerHTML=`<div class="card"><h3>Notifications</h3>
<p>No critical alerts</p>
<button onclick="home()">Back</button>
</div>`;
}

/* ================= ACCOUNT ================= */
function account(){
app.innerHTML=`<div class="card">
<h3>My Account</h3>
<input value="${state.user.name}">
<button onclick="home()">Save</button>
</div>`;
}

/* ================= AGENT ================= */
function agent(){
app.innerHTML=`<div class="card">
<h3>Agent Dashboard</h3>
<p>Queue: ${Math.floor(Math.random()*5)}</p>
<p>Active Calls: ${Math.floor(Math.random()*3)}</p>
<button onclick="home()">Back</button>
</div>`;
}

/* ================= ADMIN ================= */
function admin(){
app.innerHTML=`<div class="card">
<h3>Admin Panel</h3>
<p>Total Users: ${state.users.length}</p>
<button onclick="home()">Back</button>
</div>`;
}

/* ================= BACKGROUND ================= */
const imgs=[
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1494526585095-c41746248156"
];

setInterval(()=>{
document.body.style.backgroundImage=`url(${imgs[Math.floor(Math.random()*imgs.length)]})`;
},8000);

/* INIT */
splash();

</script>

</body>
</html>
