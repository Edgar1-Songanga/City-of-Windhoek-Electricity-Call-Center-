<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Operations Platform</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* ===== 2026 ULTRA PREMIUM UI ===== */

:root{
--bg:#09090b;
--text:#fafafa;
--muted:rgba(255,255,255,0.65);
--border:rgba(255,255,255,0.08);
--primary:#8b5cf6;
--gradient:linear-gradient(135deg,#8b5cf6,#6366f1,#22d3ee);
}

body{
margin:0;
font-family:system-ui,-apple-system,Inter,sans-serif;
background:
radial-gradient(circle at 20% 0%, rgba(139,92,246,0.15), transparent 40%),
radial-gradient(circle at 80% 100%, rgba(34,211,238,0.1), transparent 40%),
var(--bg);
color:var(--text);
}

header{
display:flex;
justify-content:space-between;
padding:20px;
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
position:sticky;top:0;
}

.controls button{
margin-left:6px;
padding:8px 12px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(255,255,255,0.05);
color:white;
cursor:pointer;
}

.container{padding:30px;max-width:1100px;margin:auto;}

.card{
background:rgba(255,255,255,0.03);
border:1px solid var(--border);
border-radius:18px;
padding:22px;
margin-bottom:18px;
backdrop-filter:blur(16px);
}

button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:var(--gradient);
color:white;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid var(--border);
background:rgba(255,255,255,0.05);
color:white;
}

#map{height:260px;border-radius:16px;}

.profile{
display:flex;
gap:15px;
align-items:center;
}

.avatar{
width:60px;height:60px;border-radius:50%;
background:linear-gradient(135deg,#6366f1,#22d3ee);
display:flex;align-items:center;justify-content:center;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<div><b>National Operations Platform</b><br><small>Magestade Pura Digital</small></div>
<div class="controls">
<button onclick="toggleTheme()">🌙</button>
<button onclick="switchLang()">🌍</button>
</div>
</header>

<div id="app" class="container"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ===== STATE ===== */

let state={
lang:localStorage.getItem("lang")||"en",
theme:localStorage.getItem("theme")||"dark",
session:localStorage.getItem("session")||null,
db:JSON.parse(localStorage.getItem("db")||JSON.stringify({
users:[],
tickets:[],
calls:[],
notifications:[],
agents:[
{id:"AG001",name:"Agent One",active:true},
{id:"AG002",name:"Agent Two",active:true}
]
}))
};

function save(){
localStorage.setItem("db",JSON.stringify(state.db));
localStorage.setItem("session",state.session);
}

/* ===== LANG ===== */

const L={
en:{login:"Login",signup:"Sign Up",customer:"Customer",agent:"Agent",admin:"Admin"},
af:{login:"Aanmeld",signup:"Registreer",customer:"Kliënt",agent:"Agent",admin:"Admin"},
osh:{login:"Log in",signup:"Sign up",customer:"Omuntu",agent:"Agent",admin:"Admin"}
};

function t(k){return L[state.lang][k]||k}

/* ===== INIT ===== */

function init(){
if(state.session) route();
else login();
}
init();

/* ===== LOGIN ===== */

function login(){
app.innerHTML=`
<div class="card">
<h3>${t("login")}</h3>
<input id="email">
<input id="pass" type="password">
<button onclick="doLogin()">Login</button>
<button onclick="signup()">Sign Up</button>
<button onclick="agentLogin()">Agent</button>
<button onclick="admin()">Admin</button>
</div>`;
}

function doLogin(){
let u=state.db.users.find(x=>x.email===email.value&&x.pass===pass.value);
if(!u)return alert("Invalid");
state.session=u.email;
save();
route();
}

/* ===== SIGNUP ===== */

function signup(){
app.innerHTML=`
<div class="card">
<h3>${t("signup")}</h3>
<input id="fn"><input id="ln"><input id="phone">
<input id="email"><input id="addr"><input id="meter">
<input id="pass" type="password"><input id="cpass" type="password">
<button onclick="create()">Create</button>
</div>`;
}

function create(){
if(pass.value!==cpass.value)return alert("Mismatch");

state.db.users.push({
name:fn.value+" "+ln.value,
email:email.value,
phone:phone.value,
address:addr.value,
meter:meter.value,
pass:pass.value,
created:new Date().toISOString()
});

save();
login();
}

/* ===== ROUTING ===== */

function route(){
let u=state.db.users.find(x=>x.email===state.session);
if(u) return home();
login();
}

/* ===== CUSTOMER HOME ===== */

function home(){
let u=state.db.users.find(x=>x.email===state.session);

app.innerHTML=`
<div class="card profile">
<div class="avatar">${u.name[0]}</div>
<div>
<b>${u.name}</b><br>
<small>${u.email}</small>
</div>
</div>

<div class="card">
<button onclick="chat()">Chat</button>
<button onclick="report()">Report Outage</button>
<button onclick="profile()">Profile</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<div id="map"></div>
</div>
`;

map();
}

/* ===== MAP ===== */

function map(){
setTimeout(()=>{
let m=L.map("map").setView([-22.56,17.08],13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(m);
},200);
}

/* ===== CHAT ===== */

let memory=[];

function chat(){
app.innerHTML=`
<div class="card">
<div id="chatBox"></div>
<input id="msg">
<button onclick="send()">Send</button>
<button onclick="home()">Back</button>
</div>`;
}

function send(){
let u=state.db.users.find(x=>x.email===state.session);
memory.push(msg.value);

chatBox.innerHTML+=`<div><b>${u.name}:</b> ${msg.value}</div>`;

let reply="Request received.";

if(memory.join(" ").includes("power")) reply="Power issue escalated.";
if(memory.join(" ").includes("bill")) reply="Billing under review.";

setTimeout(()=>{
chatBox.innerHTML+=`<div><b>System:</b> ${reply}</div>`;
},500);

}

/* ===== CALL CENTER SIM ===== */

function report(){
state.db.calls.push({
id:Date.now(),
status:"waiting"
});
alert("Call queued");
}

/* ===== AGENT ===== */

function agentLogin(){
app.innerHTML=`
<div class="card">
<h3>Agent</h3>
<button onclick="agent()">Enter Dashboard</button>
</div>`;
}

function agent(){
let queue=state.db.calls.filter(c=>c.status==="waiting");

app.innerHTML=`
<div class="card">
<h3>Queue: ${queue.length}</h3>
<button onclick="take()">Take Call</button>
<button onclick="login()">Back</button>
</div>`;
}

function take(){
let c=state.db.calls.find(x=>x.status==="waiting");
if(!c)return alert("No calls");
c.status="active";
alert("Call started");
save();
agent();
}

/* ===== ADMIN ===== */

function admin(){
app.innerHTML=`
<div class="card">
<h3>Admin Panel</h3>
<p>Users: ${state.db.users.length}</p>
<p>Calls: ${state.db.calls.length}</p>
<button onclick="login()">Back</button>
</div>`;
}

/* ===== PROFILE ===== */

function profile(){
let u=state.db.users.find(x=>x.email===state.session);

app.innerHTML=`
<div class="card">
<h3>${u.name}</h3>
<p>${u.email}</p>
<p>${u.phone}</p>
<p>${u.address}</p>
<p>${u.meter}</p>
<button onclick="home()">Back</button>
</div>`;
}

/* ===== SYSTEM ===== */

function logout(){
state.session=null;
save();
login();
}

function toggleTheme(){
document.body.style.background="#fff";
}

function switchLang(){
let arr=["en","af","osh"];
let i=arr.indexOf(state.lang);
state.lang=arr[(i+1)%3];
save();
route();
}

</script>

</body>
</html>
