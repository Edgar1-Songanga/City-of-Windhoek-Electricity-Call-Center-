<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windhoek NCOC - Command Suite 2025</title>
    
    <!-- CDNs -->
    <link rel="stylesheet" href="https://unpkg.com"/>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root {
            --bg: #030303; --glass: rgba(255, 255, 255, 0.04);
            --accent: #8b5cf6; --success: #10b981; --warning: #f59e0b;
            --text: #ffffff; --text-dim: #94a3b8; --sidebar-w: 260px;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Unified Navigation Sidebar */
        nav {
            width: var(--sidebar-w); background: rgba(3, 3, 3, 0.95); border-right: 1px solid rgba(255,255,255,0.08);
            display: flex; flex-direction: column; padding: 2rem 1.5rem; backdrop-filter: blur(10px);
        }
        nav h1 { font-size: 1.1rem; font-weight: 800; margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px; }
        .nav-item { 
            padding: 12px 16px; border-radius: 12px; cursor: pointer; color: var(--text-dim); 
            transition: 0.2s; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; font-weight: 600;
        }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .nav-item.active { color: var(--accent); }

        /* Main Workspace */
        main { flex: 1; overflow-y: auto; background: radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%); }
        header { padding: 1.5rem 3rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .container { padding: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 2rem; position: relative; }
        
        /* Stats & Charts */
        .stat-val { font-size: 2rem; font-weight: 800; margin: 0.5rem 0; }
        .stat-label { color: var(--text-dim); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        canvas { max-width: 100%; height: 200px !important; margin-top: 1rem; }

        /* Forms & Inputs */
        input, button, select { width: 100%; padding: 14px; border-radius: 12px; margin-top: 10px; font-family: inherit; }
        input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; }
        button { background: var(--accent); color: white; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4); }

        #map { height: 300px; border-radius: 16px; margin-top: 1rem; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--success); }
    </style>
</head>
<body>

<nav id="sidebar">
    <h1 id="logo">WINDHOEK NCOC</h1>
    <div id="nav-items">
        <!-- Dynamic Items via JS -->
    </div>
    <div style="margin-top: auto;">
        <div class="nav-item" onclick="loginScreen()"><span>🚪</span> Logout</div>
    </div>
</nav>

<main>
    <header>
        <div id="breadcrumb" style="font-weight: 600; color: var(--text-dim);">DASHBOARD</div>
        <div style="display:flex; gap:15px; align-items: center;">
            <span class="status-dot"></span> <small>LIVE SYSTEMS</small>
            <button onclick="changeLang()" style="width:auto; padding:8px 12px;">🌐 Lang</button>
        </div>
    </header>
    <div id="app" class="container"></div>
</main>

<script src="https://unpkg.com"></script>
<script>
    const i18n = {
        en: { welcome: "Welcome", report: "Report Outage", support: "Technical Support", account: "My Account", agent: "Command Center" },
        af: { welcome: "Welkom", report: "Meld Krag", support: "Tegniese Steun", account: "My Rekening", agent: "Bevelsentrum" },
        osh: { welcome: "Wa uhala po", report: "Lopota olusheno", support: "Omandjeleko", account: "Oakaunta", agent: "Oshikondo shomalongelo" }
    };

    let state = { 
        lang: localStorage.getItem("lang") || "en", 
        userType: null,
        userData: JSON.parse(localStorage.getItem("profile")) || { name: "Citizen", meter: "12345678901" }
    };

    function changeLang() {
        const langs = ["en", "af", "osh"];
        state.lang = langs[(langs.indexOf(state.lang) + 1) % 3];
        localStorage.setItem("lang", state.lang);
        renderNav();
        state.userType === 'agent' ? agentHome() : home();
    }

    function renderNav() {
        const items = document.getElementById('nav-items');
        items.innerHTML = '';
        const menu = state.userType === 'agent' ? 
            [{n: 'Command Hub', i: '📊', f: agentHome}, {n: 'Call Queue', i: '📞', f: agentHome}, {n: 'Grid Map', i: '🗺️', f: agentHome}] :
            [{n: 'Home', i: '🏠', f: home}, {n: i18n[state.lang].report, i: '⚡', f: home}, {n: i18n[state.lang].account, i: '👤', f: home}];
        
        menu.forEach(m => {
            let d = document.createElement('div');
            d.className = 'nav-item';
            d.innerHTML = `<span>${m.i}</span> ${m.n}`;
            d.onclick = m.f;
            items.appendChild(d);
        });
    }

    function loginScreen() {
        state.userType = null;
        document.getElementById('sidebar').style.display = 'none';
        app.innerHTML = `
        <div class="card" style="grid-column: 1/-1; max-width: 400px; margin: auto;">
            <h3>NCOC Command Portal</h3>
            <input id="user" placeholder="Account Email / Agent ID">
            <button onclick="processLogin('customer')">Citizen Access</button>
            <button style="background:rgba(255,255,255,0.05)" onclick="processLogin('agent')">Agent Portal</button>
        </div>`;
    }

    function processLogin(type) {
        state.userType = type;
        document.getElementById('sidebar').style.display = 'flex';
        renderNav();
        type === 'agent' ? agentHome() : home();
    }

    function home() {
        document.getElementById('breadcrumb').innerText = 'CITIZEN DASHBOARD';
        app.innerHTML = `
        <div class="card" style="grid-column: 1 / -1">
            <h2 style="margin:0">${i18n[state.lang].welcome}, ${state.userData.name}</h2>
            <p style="color:var(--text-dim)">Meter: ${state.userData.meter} | Balance: N$ 420.50</p>
        </div>
        <div class="card">
            <div class="stat-label">Consumption Trend (kWh)</div>
            <canvas id="userChart"></canvas>
        </div>
        <div class="card">
            <div class="stat-label">Neighborhood Grid</div>
            <div id="map"></div>
        </div>`;
        initChart('userChart', [12, 19, 3, 5, 2, 3], 'Weekly Usage');
        initMap();
    }

    function agentHome() {
        document.getElementById('breadcrumb').innerText = 'OPERATIONS COMMAND';
        app.innerHTML = `
        <div class="card"><div class="stat-label">Calls Waiting</div><div class="stat-val">14</div><div class="status-dot"></div> <small>Critical</small></div>
        <div class="card"><div class="stat-label">Avg Wait Time</div><div class="stat-val">02:45</div></div>
        <div class="card" style="grid-column: 1 / -1">
            <div class="stat-label">Live Resolution Rate</div>
            <canvas id="agentChart"></canvas>
        </div>
        <div class="card"><h3>Incoming: Windhoek West</h3><button>Accept Call</button></div>`;
        initChart('agentChart', [95, 88, 92, 98, 91, 94], 'Resolution Rate %');
    }

    function initChart(id, data, label) {
        new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels: ['M','T','W','T','F','S'], datasets: [{ label, data, borderColor: '#8b5cf6', tension: 0.4 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });
    }

    function initMap() {
        const map = L.map('map').setView([-22.56, 17.08], 13);
        L.tileLayer('https://openstreetmap.org{z}/{x}/{y}.png').addTo(map);
        L.marker([-22.56, 17.08]).addTo(map).bindPopup("Home Meter").openPopup();
    }

    loginScreen();
</script>
</body>
</html>
