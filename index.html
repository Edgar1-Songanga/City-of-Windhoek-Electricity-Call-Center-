‚Äé<!DOCTYPE html>
‚Äé<html lang="en">
‚Äé<head>
‚Äé<meta charset="UTF-8">
‚Äé<meta name="viewport" content="width=device-width, initial-scale=1.0">
‚Äé<title>National Digital Operations Platform</title>
‚Äé
‚Äé<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
‚Äé
‚Äé<style>
‚Äé:root{
‚Äé--bg:#f4f6fb;
‚Äé--card:#ffffff;
‚Äé--text:#111827;
‚Äé--primary:#1d4ed8;
‚Äé}
‚Äé
‚Äébody.dark{
‚Äé--bg:#0b1220;
‚Äé--card:#1e293b;
‚Äé--text:#ffffff;
‚Äé--primary:#38bdf8;
‚Äé}
‚Äé
‚Äébody{
‚Äémargin:0;
‚Äéfont-family:Arial;
‚Äébackground:var(--bg);
‚Äécolor:var(--text);
‚Äétransition:.3s;
‚Äé}
‚Äé
‚Äéheader{
‚Äédisplay:flex;
‚Äéjustify-content:space-between;
‚Äéalign-items:center;
‚Äépadding:12px;
‚Äébackground:#0f172a;
‚Äécolor:white;
‚Äé}
‚Äé
‚Äé.controls button{
‚Äémargin-left:6px;
‚Äépadding:6px 10px;
‚Äéborder:none;
‚Äécursor:pointer;
‚Äéborder-radius:5px;
‚Äé}
‚Äé
‚Äé.container{padding:14px;}
‚Äé
‚Äé.card{
‚Äébackground:var(--card);
‚Äépadding:14px;
‚Äéborder-radius:12px;
‚Äémargin-bottom:12px;
‚Äébox-shadow:0 2px 10px rgba(0,0,0,.06);
‚Äé}
‚Äé
‚Äéinput,button{
‚Äéwidth:100%;
‚Äépadding:8px;
‚Äémargin:5px 0;
‚Äéborder-radius:6px;
‚Äéborder:1px solid #ccc;

‚Äé
‚Äé#chatBox{
‚Äéheight:220px;
‚Äéoverflow:auto;
‚Äéborder:1px solid #ddd;
‚Äépadding:8px;
‚Äébackground:var(--card);
‚Äé}
‚Äé
‚Äé#map{height:260px;border-radius:12px;}
‚Äé</style>
‚Äé</head>
‚Äé
‚Äé<body>
‚Äé
‚Äé<header>
‚Äé<div><b>National Operations Platform</b></div>
‚Äé<div class="controls">
‚Äé<button onclick="toggleTheme()">üåô</button>
‚Äé<button onclick="switchLang()">üåç</button>
‚Äé</div>
‚Äé</header>
‚Äé
‚Äé<div id="app" class="container"></div>
‚Äé
‚Äé<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
‚Äé
‚Äé<script>
‚Äé
‚Äé/* ================= GLOBAL STATE ================= */
‚Äélet state = {
‚Äélang: localStorage.getItem("lang") || "en",
‚Äétheme: localStorage.getItem("theme") || "light",
‚ÄésessionId: localStorage.getItem("sessionId") || null,
‚Äédb: JSON.parse(localStorage.getItem("db") || JSON.stringify({
‚Äécitizens:[],
‚Äélogs:[],
‚Äéevents:[]
‚Äé}))
‚Äé};
‚Äé
‚Äéfunction save(){
‚ÄélocalStorage.setItem("db",JSON.stringify(state.db));
‚ÄélocalStorage.setItem("sessionId",state.sessionId);
‚ÄélocalStorage.setItem("lang",state.lang);
‚ÄélocalStorage.setItem("theme",state.theme);
‚Äé}
‚Äé
‚Äé/* ================= LANG ================= */
‚Äéconst L={
‚Äéen:{login:"Login",signup:"Sign Up",welcome:"Welcome",chat:"Chat",back:"Back"},
‚Äéaf:{login:"Aanmeld",signup:"Registreer",welcome:"Welkom",chat:"Gesels",back:"Terug"},
‚Äéosh:{login:"Log in",signup:"Sign up",welcome:"Wa uhala po",chat:"Ombi",back:"Shuna"}
‚Äé};
‚Äé
‚Äé/* ================= USER ================= */
‚Äéfunction user(){
‚Äéreturn state.db.citizens.find(u=>u.email===state.sessionId);
‚Äé}
‚Äé
‚Äé/* ================= INIT ================= */
‚Äéfunction init(){
‚Äédocument.body.className = state.theme==="dark"?"dark":"";
‚Äéif(state.sessionId) home();
‚Äéelse login();
‚Äé}
‚Äéinit();
‚Äé
‚Äé/* ================= LOGIN ================= */
‚Äéfunction login(){
‚Äéapp.innerHTML=`
‚Äé<div class="card">
‚Äé<h3>${L[state.lang].login}</h3>
‚Äé<input id="email">
‚Äé<input id="pass" type="password">
‚Äé<button onclick="doLogin()">Login</button>
‚Äé<button onclick="signup()">Sign Up</button>
‚Äé</div>`;
‚Äé}
‚Äé
‚Äéfunction doLogin(){
‚Äélet u = state.db.citizens.find(x=>x.email===email.value && x.pass===pass.value);
‚Äéif(!u)return alert("Invalid");
‚Äé
‚Äéstate.sessionId = u.email;
‚Äéstate.db.logs.push("LOGIN: "+u.email);
‚Äésave();
‚Äéhome();
‚Äé}
‚Äé
‚Äé/* ================= SIGNUP ================= */
‚Äéfunction signup(){
‚Äéapp.innerHTML=`
‚Äé<div class="card">
‚Äé<h3>${L[state.lang].signup}</h3>
‚Äé
‚Äé<input id="fn" placeholder="First Name">
‚Äé<input id="ln" placeholder="Last Name">
‚Äé<input id="phone" placeholder="Phone">
‚Äé<input id="email" placeholder="Email">
‚Äé<input id="addr" placeholder="Address">
‚Äé<input id="meter" placeholder="Meter Number">
‚Äé<input id="pass" type="password" placeholder="Password">
‚Äé<input id="cpass" type="password" placeholder="Confirm">
‚Äé
‚Äé<button onclick="create()">Create</button>
‚Äé</div>`;
‚Äé}
‚Äé
‚Äéfunction create(){
‚Äéif(pass.value!==cpass.value)return alert("Mismatch");
‚Äé
‚Äéstate.db.citizens.push({
‚ÄéfirstName:fn.value,
‚ÄélastName:ln.value,
‚Äéname:fn.value+" "+ln.value,
‚Äéphone:phone.value,
‚Äéemail:email.value,
‚Äéaddress:addr.value,
‚Äémeter:meter.value,
‚Äépass:pass.value
‚Äé});
‚Äé
‚Äésave();
‚Äélogin();
‚Äé}
‚Äé
‚Äé/* ================= HOME ================= */
‚Äéfunction home(){
‚Äélet u = user();
‚Äé
‚Äéapp.innerHTML=`
‚Äé<div class="card">
‚Äé<h3>${L[state.lang].welcome} ${u.name}</h3>
‚Äé
‚Äé<button onclick="chat()">Chat</button>
‚Äé<button onclick="outage()">Report Outage</button>
‚Äé<button onclick="profile()">Profile</button>
‚Äé</div>
‚Äé
‚Äé<div class="card">
‚Äé<h3>Operations - Windhoek</h3>
‚Äé<div id="map"></div>
‚Äé</div>
‚Äé`;
‚Äé
‚Äémap();
‚Äé}
‚Äé
‚Äé/* ================= MAP ================= */
‚Äéfunction map(){
‚ÄésetTimeout(()=>{
‚Äélet m=L.map('map').setView([-22.56,17.08],13);
‚Äé
‚ÄéL.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
‚Äé.addTo(m);
‚Äé
‚ÄéL.marker([-22.56,17.08])
‚Äé.addTo(m)
‚Äé.bindPopup("National Center - Windhoek");
‚Äé},200);
‚Äé}
‚Äé
‚Äé/* ================= CHAT ================= */
‚Äéfunction chat(){
‚Äéapp.innerHTML=`
‚Äé<div class="card">
‚Äé<h3>${L[state.lang].chat}</h3>
‚Äé<div id="chatBox"></div>
‚Äé<input id="msg">
‚Äé<button onclick="send()">Send</button>
‚Äé<button onclick="home()">${L[state.lang].back}</button>
‚Äé</div>`;
‚Äé}
‚Äé
‚Äéfunction send(){
‚Äélet u=user();
‚ÄéchatBox.innerHTML+=`<div><b>${u.name}:</b> ${msg.value}</div>`;
‚Äé
‚Äélet r="Request received.";
‚Äéif(msg.value.toLowerCase().includes("power")) r="Energy issue logged.";
‚Äéif(msg.value.toLowerCase().includes("bill")) r="Billing checked.";
‚Äé
‚ÄésetTimeout(()=>{
‚ÄéchatBox.innerHTML+=`<div><b>System:</b> ${r}</div>`;
‚Äé},600);
‚Äé
‚Äéstate.db.logs.push(u.email+": "+msg.value);
‚Äésave();
‚Äé}
‚Äé
‚Äé/* ================= PROFILE ================= */
‚Äéfunction profile(){
‚Äélet u=user();
‚Äé
‚Äéapp.innerHTML=`
‚Äé<div class="card">
‚Äé<h3>Profile</h3>
‚Äé
‚Äé<p>Name: ${u.name}</p>
‚Äé<p>Email: ${u.email}</p>
‚Äé<p>Phone: ${u.phone}</p>
‚Äé<p>Address: ${u.address}</p>
‚Äé<p>Meter: ${u.meter}</p>
‚Äé
‚Äé<button onclick="home()">Back</button>
‚Äé</div>`;
‚Äé}
‚Äé
‚Äé/* ================= OUTAGE ================= */
‚Äéfunction outage(){
‚Äéstate.db.events.push("OUTAGE");
‚Äéstate.db.logs.push("OUTAGE REPORTED");
‚Äésave();
‚Äéalert("Reported");
‚Äé}
‚Äé
‚Äé/* ================= UI ================= */
‚Äéfunction toggleTheme(){
‚Äéstate.theme=state.theme==="dark"?"light":"dark";
‚Äédocument.body.className=state.theme==="dark"?"dark":"";
‚Äésave();
‚Äé}
‚Äé
‚Äéfunction switchLang(){
‚Äélet arr=["en","af","osh"];
‚Äélet i=arr.indexOf(state.lang);
‚Äéstate.lang=arr[(i+1)%3];
‚Äésave();
‚Äéhome();
‚Äé}
‚Äé
‚Äé</script>
‚Äé
‚Äé</body>
‚Äé</html>
‚Äé
