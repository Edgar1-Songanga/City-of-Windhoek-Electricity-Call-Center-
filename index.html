<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Operations System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
transition:.3s;
background:#f4f6fb;
}

body.dark{
background:#0f172a;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
padding:12px;
background:#111827;
color:#fff;
align-items:center;
}

.controls button{
margin-left:6px;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:4px;
}

.container{padding:15px;}

.card{
background:#fff;
padding:12px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

body.dark .card{
background:#1e293b;
color:#fff;
}

input,button{
width:100%;
padding:8px;
margin:4px 0;
}

#chatBox{
height:220px;
overflow:auto;
border:1px solid #ddd;
padding:8px;
}

#map{
height:260px;
border-radius:10px;
}

.log{
font-size:11px;
opacity:.7;
}
</style>
</head>

<body>

<header>
<div id="title">National Operations Center</div>
<div class="controls">
<button onclick="toggleTheme()">🌙</button>
<button onclick="switchLang()">🌍</button>
</div>
</header>

<div id="app" class="container"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= CORE STATE ================= */
let state = {
lang: localStorage.getItem("lang") || "en",
theme: localStorage.getItem("theme") || "light",
session: JSON.parse(localStorage.getItem("session") || "null"),
db: JSON.parse(localStorage.getItem("db") || JSON.stringify({
users:[],
tickets:[],
notifications:[],
logs:[]
})),
context:{chatTopic:null}
};

/* ================= LANGUAGE ================= */
const L = {
en:{
login:"Login", signup:"Sign Up", welcome:"Welcome",
chat:"Chat", support:"Support", outage:"Report Outage",
account:"Account", send:"Send", back:"Back"
},
af:{
login:"Aanmeld", signup:"Registreer", welcome:"Welkom",
chat:"Gesels", support:"Ondersteuning", outage:"Rapporteer",
account:"Rekening", send:"Stuur", back:"Terug"
},
osh:{
login:"Log in", signup:"U sign up", welcome:"Wa uhala po",
chat:"Ombi", support:"Ombili", outage:"Power outage",
account:"O account", send:"Tumina", back:"Shuna"
}
};

/* ================= SAVE ================= */
function save(){
localStorage.setItem("db",JSON.stringify(state.db));
localStorage.setItem("session",JSON.stringify(state.session));
localStorage.setItem("lang",state.lang);
localStorage.setItem("theme",state.theme);
}

/* ================= INIT ================= */
function init(){
document.body.className = state.theme;
if(state.session) home();
else login();
}
init();

/* ================= LOGIN ================= */
function login(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].login}</h3>
<input id="email">
<input id="pass" type="password">
<button onclick="doLogin()">Login</button>
<button onclick="signup()">Sign Up</button>
</div>`;
}

function doLogin(){
let u = state.db.users.find(x=>x.email===email.value && x.pass===pass.value);
if(!u)return alert("Invalid");

state.session=u;
state.db.logs.push("Login: "+u.email);
save();
home();
}

/* ================= SIGNUP ================= */
function signup(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].signup}</h3>
<input id="name">
<input id="email">
<input id="pass" type="password">
<button onclick="create()">Create</button>
</div>`;
}

function create(){
state.db.users.push({
name:name.value,
email:email.value,
pass:pass.value
});
save();
login();
}

/* ================= HOME ================= */
function home(){
app.innerHTML=`
<div class="card">
<h3>${L[state.lang].welcome} ${state.session.name}</h3>

<button onclick="outage()">${L[state.lang].outage}</button>
<button onclick="support()">${L[state.lang].support}</button>
<button onclick="chat()">${L[state.lang].chat}</button>
<button onclick="account()">${L[state.lang].account}</button>
</div>

<div class="card">
<h3>Operations Map - Windhoek</h3>
<div id="map"></div>
</div>

<div class="card">
<h4>System Logs</h4>
<div class="log">
${state.db.logs.slice(-5).join("<br>")}
</div>
</div>
`;

setTimeout(mapInit,200);
}

/* ================= MAP ================= */
function mapInit(){
let map = L.map('map').setView([-22.56,17.08],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

L.marker([-22.56,17.08])
.addTo(map)
.bindPopup("National Operations Center");
}

/* ================= CHAT ================= */
function chat(){
state.context.chatTopic=null;

app.innerHTML=`
<div class="card">
<h3>${L[state.lang].chat}</h3>
<div id="chatBox"></div>
<input id="msg">
<button onclick="send()">${L[state.lang].send}</button>
<button onclick="home()">${L[state.lang].back}</button>
</div>`;
}

function send(){
let text = msg.value;
chatBox.innerHTML += `<div><b>You:</b> ${text}</div>`;

state.context.chatTopic = detect(text);

setTimeout(()=>{
chatBox.innerHTML += `<div><b>System:</b> ${reply(text)}</div>`;
},700);
}

function detect(t){
if(t.includes("bill")) return "billing";
if(t.includes("password")) return "security";
if(t.includes("delay")) return "network";
return "general";
}

function reply(t){
switch(state.context.chatTopic){
case "billing": return "Billing checked and validated.";
case "security": return "Security reset available.";
case "network": return "Network issue detected.";
default: return "Request logged in system.";
}
}

/* ================= SYSTEM ACTIONS ================= */
function outage(){
state.db.notifications.push("Outage reported");
state.db.logs.push("Outage event triggered");
save();
alert("Reported");
}

function support(){
app.innerHTML=`<div class="card">
<h3>Support</h3>
<p>FAQs / Safety / Voltage</p>
<button onclick="home()">Back</button>
</div>`;
}

function account(){
app.innerHTML=`<div class="card">
<h3>Account</h3>
<input value="${state.session.name}">
<button onclick="home()">Save</button>
</div>`;
}

/* ================= UI CONTROLS ================= */
function toggleTheme(){
state.theme = state.theme==="dark"?"light":"dark";
document.body.className=state.theme;
save();
}

function switchLang(){
let arr=["en","af","osh"];
let i=arr.indexOf(state.lang);
state.lang=arr[(i+1)%3];
save();
home();
}

</script>

</body>
  </html>
