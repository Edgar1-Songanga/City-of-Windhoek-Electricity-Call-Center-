<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windhoek NCOC - Command Suite</title>
    <link rel="stylesheet" href="https://unpkg.com"/>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #030303; --glass: rgba(255, 255, 255, 0.04);
            --accent: #8b5cf6; --success: #10b981; --text: #ffffff;
            --text-dim: #94a3b8; --radius: 20px;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 3rem; background: rgba(3, 3, 3, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 40px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 2.5rem; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        input, button, select { margin: 8px 0; padding: 16px; border-radius: 12px; width: 100%; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; }
        button { background: var(--accent); color: #fff; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }
        .back-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        #map { height: 350px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border-left: 4px solid var(--accent); }
        .stat-item small { color: var(--text-dim); }
        .status-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800;"><span class="status-dot"></span>NCOC WINDHOEK</div>
    <div style="display:flex; gap:10px">
        <button onclick="changeLang()" style="width:auto; padding:10px 15px; background:var(--glass)">🌐 Lang</button>
        <button onclick="loginScreen()" style="width:auto; padding:10px 15px; background:var(--glass)">Logout</button>
    </div>
</header>

<div id="app" class="container"></div>

<script src="https://unpkg.com"></script>
<script>
    const i18n = {
        en: { welcome: "Welcome", report: "Report Outage", support: "Technical Support", chat: "Speak to Agent", notify: "Notifications", profile: "My Account", login: "Login", back: "Back", agentMode: "Agent Dashboard", qStatus: "Queue Status", wait: "Wait Time" },
        af: { welcome: "Welkom", report: "Meld Krag", support: "Tegniese Steun", chat: "Praat met Agent", notify: "Waarskuwings", profile: "My Rekening", login: "Meld Aan", back: "Terug", agentMode: "Agent Paneel", qStatus: "Waglys", wait: "Wagtyd" },
        osh: { welcome: "Wa uhala po", report: "Lopota olusheno", support: "Omandjeleko", chat: "Popya nomukalelipo", notify: "Omauyelele", profile: "Oakaunta", login: "Longifa", back: "Shuna", agentMode: "Oatenda Dashoboada", qStatus: "Omusholondongo", wait: "Efimbo lyokutegelela" }
    };

    let state = { lang: localStorage.getItem("lang") || "en", userType: null };

    function changeLang() {
        const langs = ["en", "af", "osh"];
        state.lang = langs[(langs.indexOf(state.lang) + 1) % 3];
        localStorage.setItem("lang", state.lang);
        state.userType ? (state.userType === 'agent' ? agentHome() : home()) : loginScreen();
    }

    function loginScreen() {
        state.userType = null;
        app.innerHTML = `
        <div class="card">
            <h3>NCOC Command Suite</h3>
            <input id="user" placeholder="Email or Agent ID">
            <input id="pass" type="password" placeholder="Password">
            <button onclick="processLogin('customer')">Customer Login</button>
            <button class="back-btn" onclick="processLogin('agent')">Agent Portal</button>
        </div>`;
    }

    function processLogin(type) {
        state.userType = type;
        type === 'agent' ? agentHome() : home();
    }

    /* CUSTOMER SCREENS */
    function home() {
        app.innerHTML = `
        <div class="card" style="grid-column: 1 / -1">
            <h2>${i18n[state.lang].welcome}, Citizen</h2>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
                <button onclick="reportOutage()">${i18n[state.lang].report}</button>
                <button onclick="techSupport()">${i18n[state.lang].support}</button>
                <button onclick="startChat()">${i18n[state.lang].chat}</button>
                <button onclick="account()">${i18n[state.lang].profile}</button>
            </div>
        </div>
        <div class="card">
            <h3>Grid Status Map</h3>
            <div id="map"></div>
        </div>
        <div class="card">
            <h3>${i18n[state.lang].notify}</h3>
            <div class="stat-item"><small>Grid Update</small><br>Maintenance at Klein Windhoek completed.</div>
        </div>`;
        initMap();
    }

    function reportOutage() {
        app.innerHTML = `
        <div class="card">
            <h3>Report Power Outage</h3>
            <input placeholder="Enter Location">
            <select><option>Select Cause</option><option>Storm</option><option>Equipment Failure</option></select>
            <textarea placeholder="Describe visible issues" style="width:100%; border-radius:12px; background:rgba(0,0,0,0.5); color:white; padding:15px; margin:10px 0; border:1px solid rgba(255,255,255,0.1)"></textarea>
            <button onclick="alert('Report Dispatched'); home()">Submit Report</button>
            <button class="back-btn" onclick="home()">Back</button>
        </div>`;
    }

    function techSupport() {
        app.innerHTML = `
        <div class="card">
            <h3>Technical Support</h3>
            <div class="stat-item"><small>Troubleshoot</small><br>Flickering Lights Guide</div>
            <div class="stat-item" style="margin-top:10px"><small>Safety</small><br>Electrical Emergency Procedures</div>
            <div class="stat-item" style="margin-top:10px"><small>Voltage</small><br>Current Stability: 230V Nominal</div>
            <button class="back-btn" onclick="home()" style="margin-top:20px">Back</button>
        </div>`;
    }

    /* AGENT SCREENS */
    function agentHome() {
        app.innerHTML = `
        <div class="card" style="grid-column: 1 / -1">
            <h2>${i18n[state.lang].agentMode}</h2>
            <div class="stat-grid">
                <div class="stat-item"><small>${i18n[state.lang].qStatus}</small><br>12 Calls Waiting</div>
                <div class="stat-item"><small>${i18n[state.lang].wait}</small><br>~2.5 Minutes</div>
                <div class="stat-item"><small>Resolution Rate</small><br>94% Today</div>
                <div class="stat-item"><small>CSAT Score</small><br>4.8 / 5.0</div>
            </div>
        </div>
        <div class="card">
            <h3>Incoming Notification</h3>
            <div style="background:rgba(139, 92, 246, 0.1); border:1px solid var(--accent); padding:20px; border-radius:12px">
                <b style="color:var(--accent)">New Support Chat</b><br>
                <small>User: Lukas N.</small><br>
                <small>Issue: Meter Error Code 030</small>
                <button onclick="alert('Chat Connected')" style="margin-top:15px">Accept Interaction</button>
            </div>
        </div>
        <div class="card">
            <h3>Live Operations Map</h3>
            <div id="map"></div>
        </div>`;
        initMap();
    }

    function initMap() {
        const map = L.map('map').setView([-22.56, 17.08], 13);
        L.tileLayer('https://openstreetmap.org{z}/{x}/{y}.png').addTo(map);
        L.marker([-22.56, 17.08]).addTo(map).bindPopup("Operations Hub").openPopup();
    }

    loginScreen();
</script>
</body>
</html>
